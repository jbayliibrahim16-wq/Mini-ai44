workflows:
  mobile-codemagic:
    name: Build Android APK
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: 3.22.2 # حدّثنا Flutter لنسخة احدث شوي
      java: 17       # حددنا الجافا
    scripts:
      - name: Generate Android folder
        script: |
          flutter create . --platforms=android
      - name: Get dependencies
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --debug # منبني debug بالاول
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk # صار اسم الملف debug
